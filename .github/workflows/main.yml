name: Build Glass Messenger APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create Dummy .env file
      run: echo "GEMINI_API_KEY=dummy_key_to_pass_build" > .env

    - name: Fix signingConfig in build.gradle.kts
      run: sed -i 's/signingConfig = signingConfigs.getByName("debugConfig")/\/\/ removed signing config/g' app/build.gradle.kts

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: GlassMessenger-App
        path: app/build/outputs/apk/debug/*.apk
